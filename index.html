<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Strike - 霓虹战机</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050510;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .ui-element {
            position: absolute;
            color: #00F2FF;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            text-shadow: 0 0 10px #00F2FF;
        }
        
        #score-display {
            top: 20px;
            left: 20px;
            font-size: 24px;
        }
        
        #combo-display {
            top: 50px;
            left: 20px;
            font-size: 18px;
            color: #FF9900;
            text-shadow: 0 0 10px #FF9900;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        #combo-display.active {
            opacity: 1;
        }
        
        #life-display {
            top: 20px;
            right: 20px;
            font-size: 20px;
        }
        
        #bomb-display {
            bottom: 20px;
            right: 20px;
            font-size: 18px;
            color: #FFFF00;
            text-shadow: 0 0 10px #FFFF00;
        }
        
        #power-display {
            bottom: 20px;
            left: 20px;
            font-size: 16px;
            color: #00FF9D;
            text-shadow: 0 0 10px #00FF9D;
        }
        
        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
        }
        
        #game-over-screen.active {
            display: flex;
        }
        
        #game-over-screen h1 {
            font-size: 48px;
            color: #FF0055;
            text-shadow: 0 0 20px #FF0055;
            margin-bottom: 30px;
        }
        
        #game-over-screen .final-score {
            font-size: 32px;
            color: #00F2FF;
            margin-bottom: 20px;
        }
        
        #game-over-screen .high-score {
            font-size: 20px;
            color: #FF9900;
            margin-bottom: 40px;
        }
        
        #restart-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            border: 2px solid #00F2FF;
            color: #00F2FF;
            cursor: pointer;
            font-family: inherit;
            text-shadow: 0 0 10px #00F2FF;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            transition: all 0.3s;
        }
        
        #restart-btn:hover {
            background: #00F2FF;
            color: #050510;
        }
        
        #start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #050510 0%, #0a0a20 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        #start-screen.hidden {
            display: none;
        }
        
        #start-screen h1 {
            font-size: 42px;
            color: #00F2FF;
            text-shadow: 0 0 30px #00F2FF, 0 0 60px #0051FF;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        
        #start-screen h2 {
            font-size: 18px;
            color: #FF0055;
            text-shadow: 0 0 15px #FF0055;
            margin-bottom: 60px;
            letter-spacing: 2px;
        }
        
        #start-btn {
            padding: 18px 60px;
            font-size: 22px;
            background: transparent;
            border: 2px solid #00F2FF;
            color: #00F2FF;
            cursor: pointer;
            font-family: inherit;
            text-shadow: 0 0 10px #00F2FF;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.4);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); }
            50% { box-shadow: 0 0 50px rgba(0, 242, 255, 0.6); }
        }
        
        #start-btn:hover {
            background: #00F2FF;
            color: #050510;
            transform: scale(1.05);
        }
        
        #instructions {
            margin-top: 40px;
            color: #666;
            font-size: 14px;
            text-align: center;
            line-height: 1.8;
        }
        
        #boss-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #FF0055;
            text-shadow: 0 0 30px #FF0055;
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        
        #boss-warning.active {
            opacity: 1;
            animation: bossWarning 2s ease-in-out;
        }
        
        @keyframes bossWarning {
            0%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20%, 80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div id="ui-layer">
        <div id="score-display" class="ui-element">SCORE: 0</div>
        <div id="combo-display" class="ui-element">COMBO x1</div>
        <div id="life-display" class="ui-element">❤❤❤</div>
        <div id="bomb-display" class="ui-element">💣 x1</div>
        <div id="power-display" class="ui-element">POWER: Lv.1</div>
        <div id="boss-warning" class="ui-element">⚠ BOSS APPROACHING ⚠</div>
    </div>
    
    <div id="start-screen">
        <h1>NEON STRIKE</h1>
        <h2>霓虹战机</h2>
        <button id="start-btn">开始游戏</button>
        <div id="instructions">
            拖动飞机移动 · 自动射击<br>
            击落敌机获取道具 · 躲避弹幕
        </div>
    </div>
    
    <div id="game-over-screen">
        <h1>GAME OVER</h1>
        <div class="final-score">得分: <span id="final-score">0</span></div>
        <div class="high-score">最高分: <span id="high-score">0</span></div>
        <button id="restart-btn">再来一次</button>
    </div>

    <script>
        // ============================================
        // NEON STRIKE - 微信飞机射击游戏
        // 技术架构: Canvas 2D + 对象池 + 空间网格
        // ============================================

        // ---------------- 配置常量 ----------------
        const CONFIG = {
            // 游戏设置
            TARGET_FPS: 60,
            PLAYER_SPEED: 0, // 跟随手指，不自己移动
            
            // 玩家设置
            PLAYER_HP: 3,
            PLAYER_BOMB_COUNT: 1,
            PLAYER_INVINCIBLE_TIME: 2000,
            PLAYER_HITBOX_RADIUS: 6,
            PLAYER_GRAZE_RADIUS: 25,
            
            // 子弹设置
            BULLET_POOL_SIZE: 500,
            PLAYER_BULLET_SPEED: 800,
            ENEMY_BULLET_SPEED: 250,
            
            // 敌机设置
            ENEMY_POOL_SIZE: 50,
            SPAWN_INTERVAL_BASE: 1500,
            
            // 道具设置
            ITEM_POOL_SIZE: 30,
            ITEM_DROP_SPEED: 80,
            
            // 粒子设置
            PARTICLE_POOL_SIZE: 200,
            
            // 空间网格
            GRID_CELL_SIZE: 80,
            
            // 颜色
            COLORS: {
                PLAYER: '#00F2FF',
                PLAYER_TRAIL: '#0051FF',
                PLAYER_BULLET: '#FFFF00',
                ENEMY_SCOUT: '#FF0055',
                ENEMY_FIGHTER: '#FF6600',
                ENEMY_ELITE: '#9D00FF',
                ENEMY_BULLET: '#FF0000',
                BOSS: '#FF9900',
                ITEM_POWER: '#00FF9D',
                ITEM_BOMB: '#FFFF00',
                ITEM_SHIELD: '#00FFFF',
                ITEM_SCORE: '#FF66FF',
                GRAZE: '#FFFFFF'
            }
        };

        // ---------------- 对象池 ----------------
        class ObjectPool {
            constructor(createFn, resetFn, initialSize = 10) {
                this.createFn = createFn;
                this.resetFn = resetFn;
                this.pool = [];
                this.active = [];
                
                for (let i = 0; i < initialSize; i++) {
                    this.pool.push(createFn());
                }
            }
            
            get() {
                const obj = this.pool.pop() || this.createFn();
                this.active.push(obj);
                return obj;
            }
            
            release(obj) {
                const index = this.active.indexOf(obj);
                if (index > -1) {
                    this.active.splice(index, 1);
                    this.resetFn(obj);
                    this.pool.push(obj);
                }
            }
            
            releaseAll() {
                while (this.active.length > 0) {
                    const obj = this.active.pop();
                    this.resetFn(obj);
                    this.pool.push(obj);
                }
            }
            
            getActive() {
                return this.active;
            }
        }

        // ---------------- 空间网格 ----------------
        class SpatialGrid {
            constructor(width, height, cellSize) {
                this.cellSize = cellSize;
                this.cols = Math.ceil(width / cellSize);
                this.rows = Math.ceil(height / cellSize);
                this.cells = new Map();
            }
            
            clear() {
                this.cells.clear();
            }
            
            getKey(col, row) {
                return `${col},${row}`;
            }
            
            insert(entity) {
                const col = Math.floor(entity.x / this.cellSize);
                const row = Math.floor(entity.y / this.cellSize);
                const key = this.getKey(col, row);
                
                if (!this.cells.has(key)) {
                    this.cells.set(key, []);
                }
                this.cells.get(key).push(entity);
                
                // 插入相邻9个格子
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        if (dx === 0 && dy === 0) continue;
                        const nKey = this.getKey(col + dx, row + dy);
                        if (!this.cells.has(nKey)) {
                            this.cells.set(nKey, []);
                        }
                        this.cells.get(nKey).push(entity);
                    }
                }
            }
            
            query(x, y, radius) {
                const results = [];
                const minCol = Math.floor((x - radius) / this.cellSize);
                const maxCol = Math.floor((x + radius) / this.cellSize);
                const minRow = Math.floor((y - radius) / this.cellSize);
                const maxRow = Math.floor((y + radius) / this.cellSize);
                
                for (let col = minCol; col <= maxCol; col++) {
                    for (let row = minRow; row <= maxRow; row++) {
                        const key = this.getKey(col, row);
                        const cell = this.cells.get(key);
                        if (cell) {
                            results.push(...cell);
                        }
                    }
                }
                return results;
            }
        }

        // ---------------- 基础实体 ----------------
        class Entity {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = 0;
                this.y = 0;
                this.vx = 0;
                this.vy = 0;
                this.width = 0;
                this.height = 0;
                this.active = false;
                this.rotation = 0;
            }
            
            getCenterX() {
                return this.x + this.width / 2;
            }
            
            getCenterY() {
                return this.y + this.height / 2;
            }
            
            getRadius() {
                return Math.max(this.width, this.height) / 2;
            }
        }

        // ---------------- 玩家 ----------------
        class Player extends Entity {
constructor() {
                super();
                this.width = 40;
                this.height = 50;
                this.hp = CONFIG.PLAYER_HP;
                this.bombs = CONFIG.PLAYER_BOMB_COUNT;
                this.powerLevel = 1;
                this.invincible = false;
                this.invincibleTimer = 0;
                this.shield = false;
                this.lastShotTime = 0;
                this.fireRate = 100;
            }
            
            reset() {
                super.reset();
                this.hp = CONFIG.PLAYER_HP;
                this.bombs = CONFIG.PLAYER_BOMB_COUNT;
                this.powerLevel = 1;
                this.invincible = false;
                this.invincibleTimer = 0;
                this.shield = false;
                this.lastShotTime = 0;
            }
            
            update(dt, game) {
                // 无敌时间倒计时
                if (this.invincible) {
                    this.invincibleTimer -= dt * 1000;
                    if (this.invincibleTimer <= 0) {
                        this.invincible = false;
                        this.invincibleTimer = 0;
                    }
                }
                
                // 自动射击
                const now = Date.now();
                if (now - this.lastShotTime >= this.fireRate) {
                    this.shoot(game);
                    this.lastShotTime = now;
                }
            }
            
            shoot(game) {
                const cx = this.getCenterX();
                const cy = this.getCenterY();
                
                switch (this.powerLevel) {
                    case 1: // 单发
                        game.spawnPlayerBullet(cx - 8, cy - 20, 0, -1);
                        game.spawnPlayerBullet(cx + 8, cy - 20, 0, -1);
                        break;
                    case 2: // 散射
                        for (let angle = -20; angle <= 20; angle += 10) {
                            const rad = angle * Math.PI / 180;
                            game.spawnPlayerBullet(cx, cy - 20, Math.sin(rad) * 0.3, -Math.cos(rad));
                        }
                        break;
                    case 3: // 双散射
                        for (let angle = -30; angle <= 30; angle += 15) {
                            const rad = angle * Math.PI / 180;
                            game.spawnPlayerBullet(cx - 10, cy - 20, Math.sin(rad) * 0.35, -Math.cos(rad));
                            game.spawnPlayerBullet(cx + 10, cy - 20, Math.sin(rad) * 0.35, -Math.cos(rad));
                        }
                        break;
                    default: // 满级激光
                        game.spawnLaser(cx - 20, cy - 25);
                        game.spawnLaser(cx + 20, cy - 25);
                        break;
                }
            }
            
            draw(ctx) {
                if (this.invincible && Math.floor(Date.now() / 100) % 2 === 0) {
                    return; // 闪烁效果
                }
                
                const cx = this.getCenterX();
                const cy = this.getCenterY();
                
                // 护盾
                if (this.shield) {
                    ctx.beginPath();
                    ctx.arc(cx, cy, 30, 0, Math.PI * 2);
                    ctx.strokeStyle = CONFIG.COLORS.ITEM_SHIELD;
                    ctx.lineWidth = 2;
                    ctx.globalAlpha = 0.5 + Math.sin(Date.now() / 200) * 0.3;
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
                
                // 飞机主体 - 三角形
                ctx.save();
                ctx.translate(cx, cy);
                
                // 机身
                ctx.beginPath();
                ctx.moveTo(0, -25);
                ctx.lineTo(-15, 20);
                ctx.lineTo(-5, 15);
                ctx.lineTo(0, 22);
                ctx.lineTo(5, 15);
                ctx.lineTo(15, 20);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(0, -25, 0, 22);
                gradient.addColorStop(0, CONFIG.COLORS.PLAYER);
                gradient.addColorStop(1, CONFIG.COLORS.PLAYER_TRAIL);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 引擎火焰
                const flameLength = 10 + Math.random() * 8;
                ctx.beginPath();
                ctx.moveTo(-6, 20);
                ctx.lineTo(0, 20 + flameLength);
                ctx.lineTo(6, 20);
                ctx.closePath();
                ctx.fillStyle = '#FF6600';
                ctx.fill();
                
                ctx.restore();
                
                // 核心判定点（调试用，实际不可见）
                // ctx.beginPath();
                // ctx.arc(cx, cy, CONFIG.PLAYER_HITBOX_RADIUS, 0, Math.PI * 2);
                // ctx.fillStyle = 'red';
                // ctx.fill();
            }
            
            hit(game) {
                if (this.invincible || this.shield) {
                    if (this.shield) this.shield = false;
                    return;
                }
                
                this.hp--;
                this.invincible = true;
                this.invincibleTimer = CONFIG.PLAYER_INVINCIBLE_TIME;
                
                // 生成爆炸
                game.spawnExplosion(this.getCenterX(), this.getCenterY(), 30);
                
                if (this.hp <= 0) {
                    game.gameOver();
                }
            }
            
            useBomb(game) {
                if (this.bombs <= 0) return;
                
                this.bombs--;
                
                // 清除所有敌机子弹
                game.clearEnemyBullets();
                
                // 对所有敌机造成伤害
                game.damageAllEnemies(50);
                
                // 屏幕闪烁效果
                game.screenFlash = 1;
                
                // 生成爆炸
                for (let i = 0; i < 10; i++) {
                    const angle = (i / 10) * Math.PI * 2;
                    game.spawnExplosion(
                        game.player.getCenterX() + Math.cos(angle) * 200,
                        game.player.getCenterY() + Math.sin(angle) * 200,
                        20
                    );
                }
            }
        }

        // ---------------- 子弹 ----------------
        class Bullet extends Entity {
            constructor() {
                super();
                this.isPlayerBullet = true;
                this.damage = 10;
                this.radius = 4;
            }
            
            reset() {
                super.reset();
                this.isPlayerBullet = true;
                this.damage = 10;
                this.radius = 4;
            }
            
            update(dt, game) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                
                // 超出屏幕回收
                if (this.y < -50 || this.y > game.canvas.height + 50 ||
                    this.x < -50 || this.x > game.canvas.width + 50) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                if (this.isPlayerBullet) {
                    ctx.fillStyle = CONFIG.COLORS.PLAYER_BULLET;
                } else {
                    ctx.fillStyle = CONFIG.COLORS.ENEMY_BULLET;
                }
                ctx.fill();
                
                // 光晕
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.globalAlpha = 0.3;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // ---------------- 激光 ----------------
        class Laser extends Entity {
            constructor() {
                super();
                this.width = 8;
                this.height = 0;
                this.lifeTime = 0;
                this.maxLifeTime = 200;
                this.damage = 2;
            }
            
            reset() {
                super.reset();
                this.height = 0;
                this.lifeTime = 0;
                this.maxLifeTime = 200;
                this.damage = 2;
            }
            
            update(dt, game) {
                this.lifeTime += dt * 1000;
                this.height += 15;
                
                if (this.lifeTime >= this.maxLifeTime) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                const alpha = 1 - (this.lifeTime / this.maxLifeTime);
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // 激光核心
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(this.x - 2, this.y, 4, this.height);
                
                // 激光光晕
                const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y);
                gradient.addColorStop(0, 'rgba(0, 255, 157, 0.8)');
                gradient.addColorStop(0.5, 'rgba(0, 255, 157, 0.3)');
                gradient.addColorStop(1, 'rgba(0, 255, 157, 0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - 10, this.y, this.width + 20, this.height);
                
                ctx.restore();
            }
            
            checkCollision(enemy) {
                if (!this.active || !enemy.active) return false;
                
                return this.x > enemy.x && this.x < enemy.x + enemy.width &&
                       this.y < enemy.y + enemy.height;
            }
        }

        // ---------------- 敌机 ----------------
        class Enemy extends Entity {
            constructor() {
                super();
                this.type = 'scout';
                this.hp = 1;
                this.maxHp = 1;
                this.score = 100;
                this.damage = 1;
                this.shootInterval = 0;
                this.shootTimer = 0;
                this.movePattern = 'straight';
                this.patternTime = 0;
                this.angle = 0;
            }
            
            reset() {
                super.reset();
                this.type = 'scout';
                this.hp = 1;
                this.maxHp = 1;
                this.score = 100;
                this.damage = 1;
                this.shootInterval = 0;
                this.shootTimer = 0;
                this.movePattern = 'straight';
                this.patternTime = 0;
                this.angle = 0;
            }
            
            init(type, x, y) {
                this.active = true;
                this.x = x;
                this.y = y;
                this.type = type;
                this.patternTime = 0;
                this.angle = 0;
                
                switch (type) {
                    case 'scout':
                        this.width = 30;
                        this.height = 30;
                        this.hp = this.maxHp = 1;
                        this.score = 100;
                        this.vx = 0;
                        this.vy = 150;
                        this.movePattern = 'straight';
                        break;
                    case 'fighter':
                        this.width = 40;
                        this.height = 40;
                        this.hp = this.maxHp = 3;
                        this.score = 300;
                        this.vx = 0;
                        this.vy = 180;
                        this.shootInterval = 1500;
                        this.shootTimer = 0;
                        this.movePattern = 'zigzag';
                        break;
                    case 'elite':
                        this.width = 50;
                        this.height = 50;
                        this.hp = this.maxHp = 15;
                        this.score = 1000;
                        this.vx = 0;
                        this.vy = 100;
                        this.shootInterval = 800;
                        this.shootTimer = 0;
                        this.movePattern = 'track';
                        break;
                    case 'boss':
                        this.width = 120;
                        this.height = 80;
                        this.hp = this.maxHp = 500;
                        this.score = 5000;
                        this.vx = 80;
                        this.vy = 30;
                        this.shootInterval = 500;
                        this.shootTimer = 0;
                        this.movePattern = 'boss';
                        this.phase = 1;
                        break;
                }
            }
            
            update(dt, game) {
                this.patternTime += dt * 1000;
                
                switch (this.movePattern) {
                    case 'straight':
                        this.y += this.vy * dt;
                        break;
                    case 'zigzag':
                        this.x += Math.sin(this.patternTime / 500) * 100 * dt;
                        this.y += this.vy * dt;
                        break;
                    case 'track':
                        if (this.patternTime < 2000) {
                            // 追踪玩家
                            const dx = game.player.getCenterX() - this.getCenterX();
                            const dy = game.player.getCenterY() - this.getCenterY();
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist > 0) {
                                this.vx = (dx / dist) * 150;
                                this.vy = (dy / dist) * 100;
                            }
                        }
                        this.x += this.vx * dt;
                        this.y += this.vy * dt;
                        break;
                    case 'boss':
                        // Boss移动
                        this.x += Math.sin(this.patternTime / 2000) * this.vx * dt;
                        this.y += Math.cos(this.patternTime / 3000) * this.vy * dt * 0.5;
                        
                        // 阶段转换
                        const hpPercent = this.hp / this.maxHp;
                        if (hpPercent < 0.25 && this.phase < 3) {
                            this.phase = 3;
                        } else if (hpPercent < 0.5 && this.phase < 2) {
                            this.phase = 2;
                        }
                        break;
                }
                
                // 射击
                this.shootTimer += dt * 1000;
                if (this.shootTimer >= this.shootInterval) {
                    this.shoot(game);
                    this.shootTimer = 0;
                }
                
                // 超出屏幕回收
                if (this.y > game.canvas.height + 100) {
                    this.active = false;
                }
                
                // 边界限制
                this.x = Math.max(0, Math.min(game.canvas.width - this.width, this.x));
            }
            
            shoot(game) {
                const cx = this.getCenterX();
                const cy = this.getCenterY();
                
                if (this.type === 'fighter') {
                    // 扇形射击
                    for (let angle = -30; angle <= 30; angle += 30) {
                        const rad = angle * Math.PI / 180;
                        game.spawnEnemyBullet(cx, cy, Math.sin(rad) * CONFIG.ENEMY_BULLET_SPEED, Math.cos(rad) * CONFIG.ENEMY_BULLET_SPEED);
                    }
                } else if (this.type === 'elite') {
                    // 追踪弹
                    const dx = game.player.getCenterX() - cx;
                    const dy = game.player.getCenterY() - cy;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist > 0) {
                        game.spawnEnemyBullet(cx, cy, (dx / dist) * 350, (dy / dist) * 350);
                    }
                } else if (this.type === 'boss') {
                    // Boss多种攻击模式
                    if (this.phase === 1) {
                        // 圆形弹幕
                        for (let i = 0; i < 12; i++) {
                            const angle = (i / 12) * Math.PI * 2 + this.patternTime / 1000;
                            game.spawnEnemyBullet(cx, cy, Math.sin(angle) * 200, Math.cos(angle) * 200);
                        }
                    } else if (this.phase === 2) {
                        // 激光扫射（简化版：快速直线弹）
                        for (let i = 0; i < 8; i++) {
                            const angle = Math.PI / 2 + (i - 4) * 0.2;
                            game.spawnEnemyBullet(cx, cy, Math.sin(angle) * 300, Math.cos(angle) * 300);
                        }
                    } else {
                        // 狂暴：密集弹
                        for (let i = 0; i < 16; i++) {
                            const angle = (i / 16) * Math.PI * 2 + this.patternTime / 500;
                            game.spawnEnemyBullet(cx, cy, Math.sin(angle) * 250, Math.cos(angle) * 250);
                        }
                    }
                }
            }
            
            draw(ctx) {
                const cx = this.getCenterX();
const cy = this.getCenterY();
                
                ctx.save();
                ctx.translate(cx, cy);
                
                let color;
                switch (this.type) {
                    case 'scout': color = CONFIG.COLORS.ENEMY_SCOUT; break;
                    case 'fighter': color = CONFIG.COLORS.ENEMY_FIGHTER; break;
                    case 'elite': color = CONFIG.COLORS.ENEMY_ELITE; break;
                    case 'boss': color = CONFIG.COLORS.BOSS; break;
                }
                
                // 绘制不同形状
                if (this.type === 'scout') {
                    ctx.beginPath();
                    ctx.moveTo(0, 15);
                    ctx.lineTo(-15, -15);
                    ctx.lineTo(15, -15);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                } else if (this.type === 'fighter') {
                    ctx.beginPath();
                    ctx.moveTo(0, 20);
                    ctx.lineTo(-20, -10);
                    ctx.lineTo(-8, -5);
                    ctx.lineTo(0, -15);
                    ctx.lineTo(8, -5);
                    ctx.lineTo(20, -10);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                } else if (this.type === 'elite') {
                    ctx.beginPath();
                    ctx.arc(0, 0, 20, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.fill();
                    // 角
                    for (let i = 0; i < 4; i++) {
                        const angle = (i / 4) * Math.PI * 2;
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.lineTo(Math.cos(angle) * 30, Math.sin(angle) * 30);
                        ctx.strokeStyle = color;
                        ctx.lineWidth = 3;
                        ctx.stroke();
                    }
                } else if (this.type === 'boss') {
                    // Boss形状
                    ctx.beginPath();
                    ctx.moveTo(0, -40);
                    ctx.lineTo(-60, 40);
                    ctx.lineTo(-20, 40);
                    ctx.lineTo(-20, 20);
                    ctx.lineTo(20, 20);
                    ctx.lineTo(20, 40);
                    ctx.lineTo(60, 40);
                    ctx.closePath();
                    ctx.fillStyle = color;
                    ctx.fill();
                    
                    // 血条
                    const hpPercent = this.hp / this.maxHp;
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-40, -55, 80, 8);
                    ctx.fillStyle = hpPercent > 0.5 ? '#00FF00' : hpPercent > 0.25 ? '#FFFF00' : '#FF0000';
                    ctx.fillRect(-40, -55, 80 * hpPercent, 8);
                }
                
                ctx.restore();
            }
            
            takeDamage(damage, game) {
                this.hp -= damage;
                
                // 受伤闪烁
                game.spawnSparkles(this.getCenterX(), this.getCenterY(), 5);
                
                if (this.hp <= 0) {
                    this.die(game);
                }
            }
            
            die(game) {
                this.active = false;
                
                // 爆炸效果
                game.spawnExplosion(this.getCenterX(), this.getCenterY(), this.type === 'boss' ? 60 : 30);
                
                // 加分
                game.addScore(this.score);
                
                // 掉落道具
                if (Math.random() < (this.type === 'elite' ? 0.5 : this.type === 'boss' ? 1 : 0.1)) {
                    const itemType = this.type === 'boss' ? ['power', 'bomb', 'shield', 'score'][Math.floor(Math.random() * 4)] :
                                    Math.random() < 0.3 ? 'power' : 'score';
                    game.spawnItem(this.getCenterX(), this.getCenterY(), itemType);
                }
            }
        }

        // ---------------- 道具 ----------------
        class Item extends Entity {
            constructor() {
                super();
                this.width = 25;
                this.height = 25;
                this.type = 'power';
                this.vx = 0;
                this.vy = CONFIG.ITEM_DROP_SPEED;
            }
            
            reset() {
                super.reset();
                this.vx = 0;
                this.vy = CONFIG.ITEM_DROP_SPEED;
                this.type = 'power';
            }
            
            init(x, y, type) {
                this.active = true;
                this.x = x;
                this.y = y;
                this.type = type;
            }
            
            update(dt, game) {
                // 被玩家吸引
                const dx = game.player.getCenterX() - this.x;
                const dy = game.player.getCenterY() - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 150) {
                    this.vx = dx / dist * 300;
                    this.vy = dy / dist * 300;
                } else {
                    this.vx = Math.sin(this.y / 100) * 50;
                    this.vy = CONFIG.ITEM_DROP_SPEED;
                }
                
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                
                // 边界反弹
                if (this.x < 0 || this.x > game.canvas.width - this.width) {
                    this.vx *= -1;
                    this.x = Math.max(0, Math.min(game.canvas.width - this.width, this.x));
                }
                
                // 超出屏幕回收
                if (this.y > game.canvas.height + 50) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                const cx = this.getCenterX();
                const cy = this.getCenterY();
                
                let color;
                let icon;
                switch (this.type) {
                    case 'power':
                        color = CONFIG.COLORS.ITEM_POWER;
                        icon = 'P';
                        break;
                    case 'bomb':
                        color = CONFIG.COLORS.ITEM_BOMB;
                        icon = '💣';
                        break;
                    case 'shield':
                        color = CONFIG.COLORS.ITEM_SHIELD;
                        icon = 'S';
                        break;
                    case 'score':
                        color = CONFIG.COLORS.ITEM_SCORE;
                        icon = '2x';
                        break;
                }
                
                ctx.save();
                ctx.translate(cx, cy);
                
                // 背景圆
                ctx.beginPath();
                ctx.arc(0, 0, 12, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.3;
                ctx.fill();
                ctx.globalAlpha = 1;
                
                // 边框
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 图标
                ctx.fillStyle = color;
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(icon, 0, 0);
                
                ctx.restore();
            }
            
            collect(game) {
                this.active = false;
                
                switch (this.type) {
                    case 'power':
                        if (game.player.powerLevel < 5) {
                            game.player.powerLevel++;
                        }
                        game.addScore(500);
                        break;
                    case 'bomb':
                        if (game.player.bombs < 3) {
                            game.player.bombs++;
                        }
                        game.addScore(500);
                        break;
                    case 'shield':
                        game.player.shield = true;
                        game.addScore(500);
                        break;
                    case 'score':
                        game.scoreMultiplier = 2;
                        game.scoreMultiplierTimer = 10000;
                        game.addScore(1000);
                        break;
                }
            }
        }

        // ---------------- 粒子 ----------------
        class Particle extends Entity {
            constructor() {
                super();
                this.radius = 3;
                this.lifeTime = 0;
                this.maxLifeTime = 500;
                this.color = '#FFFFFF';
            }
            
            reset() {
                super.reset();
                this.lifeTime = 0;
                this.maxLifeTime = 500;
                this.color = '#FFFFFF';
                this.radius = 3;
            }
            
            init(x, y, vx, vy, color, lifeTime = 500) {
                this.active = true;
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.maxLifeTime = lifeTime;
                this.lifeTime = 0;
            }
            
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.lifeTime += dt * 1000;
                
                if (this.lifeTime >= this.maxLifeTime) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                const alpha = 1 - (this.lifeTime / this.maxLifeTime);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * alpha, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // ---------------- 星空背景 ----------------
        class Starfield {
            constructor(width, height) {
                this.stars = [];
                this.init(width, height);
            }
            
            init(width, height) {
                this.stars = [];
                for (let i = 0; i < 100; i++) {
                    this.stars.push({
                        x: Math.random() * width,
                        y: Math.random() * height,
                        speed: 50 + Math.random() * 150,
                        size: 1 + Math.random() * 2,
                        brightness: 0.3 + Math.random() * 0.7
                    });
                }
            }
            
            resize(width, height) {
                this.init(width, height);
            }
            
            update(dt) {
                for (const star of this.stars) {
                    star.y += star.speed * dt;
                    if (star.y > window.innerHeight) {
                        star.y = 0;
                        star.x = Math.random() * window.innerWidth;
                    }
                }
            }
            
            draw(ctx) {
                for (const star of this.stars) {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${star.brightness})`;
                    ctx.fill();
                }
            }
        }

        // ---------------- 游戏主类 ----------------
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // 初始化对象池
                this.initPools();
                
                // 游戏状态
                this.state = 'menu'; // menu, playing, gameover
                this.score = 0;
                this.highScore = parseInt(localStorage.getItem('neonStrikeHighScore') || '0');
                this.combo = 0;
                this.comboTimer = 0;
                this.scoreMultiplier = 1;
                this.scoreMultiplierTimer = 0;
                
                // 游戏对象
                this.player = new Player();
                this.starfield = new Starfield(this.canvas.width, this.canvas.height);
                
                // 敌机生成
                this.spawnTimer = 0;
                this.spawnInterval = CONFIG.SPAWN_INTERVAL_BASE;
                this.waveCount = 0;
                this.bossSpawned = false;
                this.bossWarning = false;
                
                // 空间网格
                this.spatialGrid = new SpatialGrid(this.canvas.width, this.canvas.height, CONFIG.GRID_CELL_SIZE);
                
                // 屏幕特效
                this.screenFlash = 0;
                
                // 输入处理
                this.initInput();
                
                // UI元素
                this.ui = {
                    score: document.getElementById('score-display'),
                    combo: document.getElementById('combo-display'),
                    life: document.getElementById('life-display'),
                    bomb: document.getElementById('bomb-display'),
                    power: document.getElementById('power-display'),
                    startScreen: document.getElementById('start-screen'),
                    gameOverScreen: document.getElementById('game-over-screen'),
                    finalScore: document.getElementById('final-score'),
                    highScore: document.getElementById('high-score'),
                    bossWarning: document.getElementById('boss-warning')
                };
                
                // 绑定按钮
                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('restart-btn').addEventListener('click', () => this.restartGame());
                
                // 最后一帧时间
                this.lastTime = 0;
                
                // 启动游戏循环
                requestAnimationFrame((t) => this.gameLoop(t));
            }
            
            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                if (this.starfield) {
                    this.starfield.resize(this.canvas.width, this.canvas.height);
                }
            }
            
            initPools() {
                this.bulletPool = new ObjectPool(
                    () => new Bullet(),
                    (b) => b.reset(),
                    CONFIG.BULLET_POOL_SIZE
                );
                
                this.enemyPool = new ObjectPool(
                    () => new Enemy(),
                    (e) => e.reset(),
                    CONFIG.ENEMY_POOL_SIZE
                );
                
                this.itemPool = new ObjectPool(
                    () => new Item(),
                    (i) => i.reset(),
                    CONFIG.ITEM_POOL_SIZE
                );
                
                this.particlePool = new ObjectPool(
                    () => new Particle(),
                    (p) => p.reset(),
                    CONFIG.PARTICLE_POOL_SIZE
                );
                
                this.laserPool = new ObjectPool(
                    () => new Laser(),
                    (l) => l.reset(),
                    10
                );
            }
            
            initInput() {
                let touching = false;
                
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    if (this.state === 'playing') {
                        touching = true;
                        this.handleTouch(e.touches[0]);
                    }
                }, { passive: false });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    if (this.state === 'playing' && touching) {
                        this.handleTouch(e.touches[0]);
                    }
                }, { passive: false });
                
                this.canvas.addEventListener('touchend', () => {
                    touching = false;
                });
                
                // 鼠标支持（测试用）
                this.canvas.addEventListener('mousedown', (e) => {
                    if (this.state === 'playing') {
                        touching = true;
                        this.handleTouch(e);
                    }
                });
                
                this.canvas.addEventListener('mousemove', (e) => {
                    if (this.state === 'playing' && touching) {
                        this.handleTouch(e);
                    }
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    touching = false;
                });
                
                // 炸弹按钮（点击右上角）
                this.canvas.addEventListener('touchstart', (e) => {
                    if (this.state === 'playing') {
                        const x = e.touches[0].clientX;
                        const y = e.touches[0].clientY;
                        if (x > this.canvas.width * 0.8 && y < this.canvas.height * 0.3) {
                            this.player.useBomb(this);
                        }
                    }
                });
            }
            
            handleTouch(e) {
                const rect = this.canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // 限制玩家在屏幕内
                this.player.x = Math.max(0, Math.min(this.canvas.width - this.player.width, x - this.player.width / 2));
                this.player.y = Math.max(0, Math.min(this.canvas.height - this.player.height, y - this.player.height / 2));
            }
            
            startGame() {
                this.ui.startScreen.classList.add('hidden');
                this.state = 'playing';
                this.resetGame();
            }
            
            restartGame() {
                this.ui.gameOverScreen.classList.remove('active');
                this.state = 'playing';
                this.resetGame();
            }
            
            resetGame() {
                this.score = 0;
                this.combo = 0;
                this.comboTimer = 0;
                this.scoreMultiplier = 1;
                this.scoreMultiplierTimer = 0;
                
                this.player.reset();
                this.player.x = this.canvas.width / 2 - this.player.width / 2;
                this.player.y = this.canvas.height - 100;
                
                this.bulletPool.releaseAll();
                this.enemyPool.releaseAll();
                this.itemPool.releaseAll();
                this.particlePool.releaseAll();
                this.laserPool.releaseAll();
                
                this.spawnTimer = 0;
                this.spawnInterval = CONFIG.SPAWN_INTERVAL_BASE;
                this.waveCount = 0;
                this.bossSpawned = false;
                this.bossWarning = false;
                
                this.updateUI();
            }
            
            gameOver() {
                this.state = 'gameover';
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('neonStrikeHighScore', this.highScore.toString());
                }
                
                this.ui.finalScore.textContent = this.score.toLocaleString();
                this.ui.highScore.textContent = this.highScore.toLocaleString();
                this.ui.gameOverScreen.classList.add('active');
            }
            
            addScore(points) {
                const multiplier = this.scoreMultiplier * (1 + Math.floor(this.combo / 10) * 0.1);
                this.score += Math.floor(points * multiplier);
                this.combo++;
                this.comboTimer = 2000;
                this.updateUI();
            }
            
            spawnPlayerBullet(x, y, vx, vy) {
                const bullet = this.bulletPool.get();
                bullet.init ? bullet.init() : bullet.reset();
                bullet.active = true;
                bullet.isPlayerBullet = true;
                bullet.x = x;
                bullet.y = y;
                bullet.vx = vx * CONFIG.PLAYER_BULLET_SPEED;
                bullet.vy = vy * CONFIG.PLAYER_BULLET_SPEED;
                bullet.damage = 10;
                bullet.radius = 4;
            }
            
            spawnEnemyBullet(x, y, vx, vy) {
                const bullet = this.bulletPool.get();
                bullet.init ? bullet.init() : bullet.reset();
                bullet.active = true;
                bullet.isPlayerBullet = false;
                bullet.x = x;
                bullet.y = y;
                bullet.vx = vx;
                bullet.vy = vy;
                bullet.damage = 1;
                bullet.radius = 5;
            }
            
            spawnLaser(x, y) {
                const laser = this.laserPool.get();
                laser.reset();
                laser.active = true;
                laser.x = x;
                laser.y = y;
            }
            
            spawnEnemy(type, x, y) {
                const enemy = this.enemyPool.get();
                enemy.reset();
                enemy.init(type, x, y);
            }
            
            spawnItem(x, y, type) {
                const item = this.itemPool.get();
                item.reset();
                item.init(x, y, type);
            }
            
            spawnExplosion(x, y, size) {
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 100 + Math.random() * 200;
                    const particle = this.particlePool.get();
                    particle.reset();
                    particle.init(
                        x, y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        CONFIG.COLORS.ENEMY_SCOUT,
                        300 + Math.random() * 300
                    );
                }
            }
            
            spawnSparkles(x, y, count) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 50 + Math.random() * 100;
                    const particle = this.particlePool.get();
                    particle.reset();
                    particle.init(
                        x, y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        '#FFFFFF',
                        200
                    );
                }
            }
            
            clearEnemyBullets() {
                const bullets = this.bulletPool.getActive();
                for (const bullet of bullets) {
                    if (!bullet.isPlayerBullet) {
                        bullet.active = false;
                        this.bulletPool.release(bullet);
                    }
                }
            }
            
            damageAllEnemies(damage) {
                const enemies = this.enemyPool.getActive();
                for (const enemy of enemies) {
                    if (enemy.active) {
                        enemy.takeDamage(damage, this);
                    }
                }
            }
            
            checkCollisions() {
                // 重建空间网格
                this.spatialGrid.clear();
                
                // 插入所有子弹
                const bullets = this.bulletPool.getActive();
                for (const bullet of bullets) {
                    if (bullet.active) {
                        this.spatialGrid.insert(bullet);
                    }
                }
                
                // 插入所有敌机
                const enemies = this.enemyPool.getActive();
                for (const enemy of enemies) {
                    if (enemy.active) {
                        this.spatialGrid.insert(enemy);
                    }
                }
                
                // 玩家子弹 vs 敌机
                for (const bullet of bullets) {
                    if (!bullet.active || !bullet.isPlayerBullet) continue;
                    
                    const nearby = this.spatialGrid.query(bullet.x, bullet.y, 50);
                    for (const entity of nearby) {
                        if (entity instanceof Enemy && entity.active) {
                            // 圆形碰撞检测
                            const dx = bullet.x - entity.getCenterX();
                            const dy = bullet.y - entity.getCenterY();
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist < bullet.radius + entity.getRadius()) {
                                entity.takeDamage(bullet.damage, this);
                                bullet.active = false;
                                this.bulletPool.release(bullet);
                                break;
                            }
                        }
                    }
                }
                
                // 激光 vs 敌机
                const lasers = this.laserPool.getActive();
                for (const laser of lasers) {
                    if (!laser.active) continue;
                    
                    for (const enemy of enemies) {
                        if (enemy.active && laser.checkCollision(enemy)) {
                            enemy.takeDamage(laser.damage, this);
                        }
                    }
                }
                
                // 敌机子弹 vs 玩家
                for (const bullet of bullets) {
                    if (!bullet.active || bullet.isPlayerBullet) continue;
                    
                    // 擦弹检测
                    const grazeDx = bullet.x - this.player.getCenterX();
                    const grazeDy = bullet.y - this.player.getCenterY();
                    const grazeDist = Math.sqrt(grazeDx * grazeDx + grazeDy * grazeDy);
                    
                    if (grazeDist < CONFIG.PLAYER_GRAZE_RADIUS + bullet.radius) {
                        // 擦弹
                        this.addScore(50);
                        this.spawnSparkles(bullet.x, bullet.y, 2);
                    }
                    
                    // 核心碰撞
                    if (grazeDist < CONFIG.PLAYER_HITBOX_RADIUS + bullet.radius) {
                        this.player.hit(this);
                        bullet.active = false;
                        this.bulletPool.release(bullet);
                    }
                }
                
                // 敌机 vs 玩家
                for (const enemy of enemies) {
                    if (!enemy.active) continue;
                    
                    const dx = enemy.getCenterX() - this.player.getCenterX();
                    const dy = enemy.getCenterY() - this.player.getCenterY();
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < enemy.getRadius() + CONFIG.PLAYER_HITBOX_RADIUS) {
                        enemy.takeDamage(100, this);
                        this.player.hit(this);
                    }
                }
                
                // 道具 vs 玩家
                const items = this.itemPool.getActive();
                for (const item of items) {
                    if (!item.active) continue;
                    
                    const dx = item.getCenterX() - this.player.getCenterX();
                    const dy = item.getCenterY() - this.player.getCenterY();
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 30) {
                        item.collect(this);
                    }
                }
            }
            
            spawnWave() {
                this.waveCount++;
                
                // 每1000分生成Boss
                if (this.score >= 1000 && !this.bossSpawned) {
                    this.bossSpawned = true;
                    this.bossWarning = true;
                    this.ui.bossWarning.classList.add('active');
                    
                    setTimeout(() => {
                        this.bossWarning = false;
                        this.ui.bossWarning.classList.remove('active');
                        this.spawnEnemy('boss', this.canvas.width / 2 - 60, -80);
                    }, 2000);
                    return;
                }
                
                // 正常生成敌机
                const type = this.waveCount < 5 ? 'scout' :
                           this.waveCount < 15 ? 'scout' :
                           this.waveCount < 25 ? 'fighter' :
                           'elite';
                
                const count = 1 + Math.floor(this.waveCount / 10);
                
                for (let i = 0; i < count; i++) {
                    const x = 50 + Math.random() * (this.canvas.width - 100);
                    const y = -50 - Math.random() * 100;
                    this.spawnEnemy(type, x, y);
                }
                
                // 逐渐增加难度
                this.spawnInterval = Math.max(500, CONFIG.SPAWN_INTERVAL_BASE - this.waveCount * 30);
            }
            
            update(dt) {
                if (this.state !== 'playing') return;
                
                // 更新星空
                this.starfield.update(dt);
                
                // 更新玩家
                this.player.update(dt, this);
                
                // 更新连击
                if (this.comboTimer > 0) {
                    this.comboTimer -= dt * 1000;
                    if (this.comboTimer <= 0) {
                        this.combo = 0;
                    }
                }
                
                // 更新分数倍率
                if (this.scoreMultiplierTimer > 0) {
                    this.scoreMultiplierTimer -= dt * 1000;
                    if (this.scoreMultiplierTimer <= 0) {
                        this.scoreMultiplier = 1;
                    }
                }
                
                // 生成敌机
                this.spawnTimer += dt * 1000;
                if (this.spawnTimer >= this.spawnInterval && !this.bossWarning) {
                    this.spawnWave();
                    this.spawnTimer = 0;
                }
                
                // 更新子弹
                const bullets = this.bulletPool.getActive();
                for (const bullet of bullets) {
                    if (bullet.active) {
                        bullet.update(dt, this);
                    }
                }
                
                // 更新激光
                const lasers = this.laserPool.getActive();
                for (const laser of lasers) {
                    if (laser.active) {
                        laser.update(dt, this);
                    }
                }
                
                // 更新敌机
                const enemies = this.enemyPool.getActive();
                for (const enemy of enemies) {
                    if (enemy.active) {
                        enemy.update(dt, this);
                    }
                }
                
                // 更新道具
                const items = this.itemPool.getActive();
                for (const item of items) {
                    if (item.active) {
                        item.update(dt, this);
                    }
                }
                
                // 更新粒子
                const particles = this.particlePool.getActive();
                for (const particle of particles) {
                    if (particle.active) {
                        particle.update(dt);
                    }
                }
                
                // 碰撞检测
                this.checkCollisions();
                
                // 回收 inactive 对象
                this.cleanup();
                
                // 更新UI
                this.updateUI();
                
                // 屏幕闪烁衰减
                if (this.screenFlash > 0) {
                    this.screenFlash -= dt * 3;
                }
            }
            
            cleanup() {
                const bullets = this.bulletPool.getActive();
                for (const bullet of bullets) {
                    if (!bullet.active) {
                        this.bulletPool.release(bullet);
                    }
                }
                
                const enemies = this.enemyPool.getActive();
                for (const enemy of enemies) {
                    if (!enemy.active) {
                        this.enemyPool.release(enemy);
                    }
                }
                
                const items = this.itemPool.getActive();
                for (const item of items) {
                    if (!item.active) {
                        this.itemPool.release(item);
                    }
                }
                
                const particles = this.particlePool.getActive();
                for (const particle of particles) {
                    if (!particle.active) {
                        this.particlePool.release(particle);
                    }
                }
                
                const lasers = this.laserPool.getActive();
                for (const laser of lasers) {
                    if (!laser.active) {
                        this.laserPool.release(laser);
                    }
                }
            }
            
            updateUI() {
                this.ui.score.textContent = `SCORE: ${this.score.toLocaleString()}`;
                
                if (this.combo > 1) {
                    this.ui.combo.textContent = `COMBO x${this.combo}`;
                    this.ui.combo.classList.add('active');
                } else {
                    this.ui.combo.classList.remove('active');
                }
                
                this.ui.life.textContent = '❤'.repeat(Math.max(0, this.player.hp));
                
                this.ui.bomb.textContent = `💣 x${this.player.bombs}`;
                
                this.ui.power.textContent = `POWER: Lv.${this.player.powerLevel}`;
            }
            
            draw() {
                const ctx = this.ctx;
                
                // 清空画布
                ctx.fillStyle = '#050510';
                ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制星空
                this.starfield.draw(ctx);
                
                if (this.state === 'playing' || this.state === 'gameover') {
                    // 绘制道具
                    const items = this.itemPool.getActive();
                    for (const item of items) {
                        if (item.active) {
                            item.draw(ctx);
                        }
                    }
                    
                    // 绘制敌机
                    const enemies = this.enemyPool.getActive();
                    for (const enemy of enemies) {
                        if (enemy.active) {
                            enemy.draw(ctx);
                        }
                    }
                    
                    // 绘制激光
                    const lasers = this.laserPool.getActive();
                    for (const laser of lasers) {
                        if (laser.active) {
                            laser.draw(ctx);
                        }
                    }
                    
                    // 绘制子弹
                    const bullets = this.bulletPool.getActive();
                    for (const bullet of bullets) {
                        if (bullet.active) {
                            bullet.draw(ctx);
                        }
                    }
                    
                    // 绘制粒子
                    const particles = this.particlePool.getActive();
                    for (const particle of particles) {
                        if (particle.active) {
                            particle.draw(ctx);
                        }
                    }
                    
                    // 绘制玩家
                    if (this.state === 'playing') {
                        this.player.draw(ctx);
                    }
                    
                    // 屏幕闪烁效果
                    if (this.screenFlash > 0) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.screenFlash * 0.5})`;
                        ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    }
                }
            }
            
            gameLoop(timestamp) {
                const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
                this.lastTime = timestamp;
                
                this.update(dt);
                this.draw();
                
                requestAnimationFrame((t) => this.gameLoop(t));
            }
        }

        // 启动游戏
        window.addEventListener('load', () => {
            new Game();
        });
    </script>
</body>
</html>
